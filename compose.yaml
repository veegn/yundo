services:
  init-cache-perms:
    image: alpine:3.20
    container_name: yundo-init-cache-perms
    command:
      - sh
      - -c
      - mkdir -p /cache && chmod 777 /cache
    volumes:
      - yundo-cache:/cache
    restart: "no"

  yundo:
    image: ghcr.io/veegn/yundo:latest
    container_name: yundo
    restart: unless-stopped
    depends_on:
      init-cache-perms:
        condition: service_completed_successfully
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --cache-dir
      - /tmp/cache
      - --cache-size
      - 1GiB
      - --frontend-dist
      - ./frontend/dist
    volumes:
      - yundo-cache:/tmp/cache
    expose:
      - "8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: yundo-nginx
    restart: unless-stopped
    depends_on:
      - yundo
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro

volumes:
  yundo-cache:
