server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # SSL Certificate configuration
    ssl_certificate /etc/nginx/certs/yundo.crt;
    ssl_certificate_key /etc/nginx/certs/yundo.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Crucial: Disable request body size limits to allow large file uploads
    client_max_body_size 0;

    # Buffer adjustments for large payloads
    client_body_buffer_size 10M;

    location / {
        proxy_pass http://yundo:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Optimize connection timeouts for large uploads and downloads
        proxy_connect_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        send_timeout 3600s;
    }
}
